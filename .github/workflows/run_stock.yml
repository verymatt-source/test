name: Get Stock Data

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  get-stock:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v3
    
    - name: 2. 安装Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 3. 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 4. 运行脚本
      run: |
        python stock.py
